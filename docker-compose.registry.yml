# Docker Compose para produção usando imagens do GitHub Container Registry
# Use este arquivo quando quiser usar as imagens pré-buildadas do CI/CD
# Otimizado para VPS com Docker Standalone + Portainer + Nginx Proxy Manager

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: relatorios-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - relatorios-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    # Imagem do GitHub Container Registry
    # Substitua 'vicctim/relatorios' pelo seu usuário/repositório se diferente
    image: ghcr.io/vicctim/relatorios/backend:latest
    container_name: relatorios-backend
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-500}
      COMPRESSION_THRESHOLD_MB: ${COMPRESSION_THRESHOLD_MB:-100}
      PORT: 3001
      TZ: America/Sao_Paulo
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}  # Setar true apenas no primeiro deploy
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - relatorios-network
      - proxy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    # Imagem do GitHub Container Registry
    # Substitua 'vicctim/relatorios' pelo seu usuário/repositório se diferente
    image: ghcr.io/vicctim/relatorios/frontend:latest
    container_name: relatorios-frontend
    restart: always
    networks:
      - relatorios-network
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  relatorios-network:
    driver: bridge
  proxy:
    external: true
    name: npm_default

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
