version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: relatorios-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${DB_NAME:-relatorios}
      MYSQL_USER: ${DB_USER:-relatorios}
      MYSQL_PASSWORD: ${DB_PASSWORD:-relatorios123}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - relatorios-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: relatorios-backend
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-relatorios}
      DB_USER: ${DB_USER:-relatorios}
      DB_PASSWORD: ${DB_PASSWORD:-relatorios123}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-https://relatorio.pixfilmes.com}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-500}
      COMPRESSION_THRESHOLD_MB: ${COMPRESSION_THRESHOLD_MB:-100}
      TZ: America/Sao_Paulo
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - relatorios-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-https://relatorio.pixfilmes.com/api}
    container_name: relatorios-frontend
    restart: always
    networks:
      - relatorios-network

  nginx:
    image: nginx:alpine
    container_name: relatorios-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - relatorios-network

networks:
  relatorios-network:
    driver: bridge

volumes:
  mysql_data:
  uploads_data:
